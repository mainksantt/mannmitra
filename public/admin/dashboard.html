<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — MannMitra</title>
  <link rel="stylesheet" href="/admin/admin.css">
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">🧠 MannMitra <span>Admin</span></div>
      <nav>
        <span id="booking-count" class="badge">— bookings</span>
        <a href="/admin/api/bookings/export.csv" class="btn btn-outline">⬇ Export CSV</a>
        <a href="/admin/logout" class="btn btn-danger">Logout</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="toolbar">
      <input type="text" id="search" placeholder="🔍 Search by name, email or phone…">
      <select id="filter-status">
        <option value="">All Statuses</option>
        <option value="Pending">Pending</option>
        <option value="Contacted">Contacted</option>
        <option value="In Progress">In Progress</option>
        <option value="Completed">Completed</option>
      </select>
    </div>

    <div id="error-banner" class="error-banner hidden">⚠️ <span id="error-msg"></span></div>

    <div class="table-wrap">
      <table id="bookings-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Preferred Time</th>
            <th>Message</th>
            <th>Submitted</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="7" class="loading">Loading bookings…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="/admin/admin.js"></script>
</body>
</html>
